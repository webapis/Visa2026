# Example: login + Person employee detail fill
# AUTHORITATIVE PLAN: person-employee-minimal_map.md — do not treat as runnable until map status = Ready for YAML
# Prerequisites: all hooks in map §3 verified in docs/UI_TEST_HOOKS.md

id: person-employee-minimal
description: Log in, open employee Person detail, fill FirstName and LastName
requiresAuth: true

env:
  personDetailPath: /Person_DetailView_Employee/REPLACE-WITH-GUID

steps:
  - login:
      user: Admin
      password: ""
  - goto: ${personDetailPath}
  - fill:
      person-first-name: Scenario
      person-last-name: Employee
