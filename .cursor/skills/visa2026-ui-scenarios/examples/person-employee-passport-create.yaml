# DRAFT — green-run on :5052 before treating as promoted
# AUTHORITATIVE PLAN: person-employee-passport-create_map.md
# Per-step timeout: ms budget for that step only (see map §5). Omit = runner --timeout (90s via Invoke-UiScenarioRun.ps1).

id: person-employee-passport-create
description: Create employee, Save, return to list, reopen detail, add passport on Passports tab, Save
requiresAuth: true

env:
  # Phase A — Person (unique per run; use -FreshDatabase or change numbers on reuse)
  employeePersonalNumber: E2E-PPT-EMP-001
  employeeFirstName: Passport
  employeeLastName: Scenario
  employeeDateOfBirth: "01.01.1990"
  employeeBirthPlace: Ashgabat
  employeeCountryOfBirth: Türkiye
  employeeGender: Male
  employeeMaritalStatus: Single
  employeeNationality: Türkiye
  employeeForeignAddress: E2E passport scenario foreign address
  employeeForeignAddressCountry: Türkiye
  employeeProjectContract: GT-15
  employeeSubcontractor: Çalyk Enerji
  employeeVisaFamilyMembersText: "Ýok"
  # Phase C — Passport (ExpirationDate must be after IssueDate)
  passportNumber: E2E-PPT-NO-001
  passportType: "P — National passport"
  passportIssuedCountry: Türkiye
  passportIssueDate: "01.01.2024"
  passportExpirationDate: "01.01.2034"
  passportAuthority: E2E Migration Authority

steps:
  - login:
      user: standarduser
      password: ""

  # --- Phase A: create + persist employee, then close detail ---
  - goto: /Person_ListView_Employees
  - wait-for:
      hook: person-list-employees-new
      timeout: 15000
  - click: person-list-employees-new
  - wait-for:
      hook: person-first-name
      timeout: 15000
  - fill:
      person-first-name: ${employeeFirstName}
      person-last-name: ${employeeLastName}
      person-personal-number: ${employeePersonalNumber}
      person-date-of-birth: ${employeeDateOfBirth}
      person-birth-place: ${employeeBirthPlace}
      person-country-of-birth: ${employeeCountryOfBirth}
      person-gender: ${employeeGender}
      person-marital-status: ${employeeMaritalStatus}
      person-nationality: ${employeeNationality}
      person-foreign-address: ${employeeForeignAddress}
      person-foreign-address-country: ${employeeForeignAddressCountry}
      person-project-contract: ${employeeProjectContract}
      person-subcontractor: ${employeeSubcontractor}
      person-visa-application-family-members-text: ${employeeVisaFamilyMembersText}
  # SaveAndClose is not on toolbar for *new* employee detail — Save then goto list (person-employee-create pattern).
  - click: person-detail-employee-save
  - goto: /Person_ListView_Employees
  - wait-for:
      hook: person-list-employees-new
      timeout: 15000

  # --- Phase A2: reopen saved employee (nested Passports New hook needs full detail remount) ---
  - click-text:
      text: ${employeePersonalNumber}
      timeout: 20000
  - wait-for:
      hook: person-employee-tabs
      timeout: 20000

  # --- Phase B: Passports tab + nested New (click applies shadow-DOM hook + clicks) ---
  - select-tab:
      hook: person-employee-tab-passports
      timeout: 15000
  - click:
      hook: person-employee-tab-passports-new
      timeout: 45000
  - wait-for:
      hook: passport-passport-number
      timeout: 20000

  # --- Phase C: fill + save Passport ---
  - fill:
      passport-passport-number: ${passportNumber}
      passport-passport-type: ${passportType}
      passport-issued-country: ${passportIssuedCountry}
      passport-issue-date: ${passportIssueDate}
      passport-expiration-date: ${passportExpirationDate}
      passport-authority: ${passportAuthority}
  - click: passport-detail-save

  # --- Assert: back on Person detail Passports tab (grid row hook waived v1) ---
  - wait-for:
      hook: person-employee-tab-passports
      timeout: 20000
  - assert-visible:
      hook: person-employee-tab-passports-new
      timeout: 45000
