name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Start LocalDB
      run: |
        sqllocaldb create MSSQLLocalDB
        sqllocaldb start MSSQLLocalDB

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration EasyTest

    - name: Run Tests
      env:
        VISA2026_E2E_HEADLESS: true
      run: dotnet test Visa2026.E2E.Tests\Visa2026.E2E.Tests.csproj --no-build --configuration EasyTest --logger trx