services:
  app:
    image: webapia/visa2026:latest # <-- Pulls the image from Docker Hub instead of building
    ports:
      - "80:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=Visa2026Db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Production
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__DevExpress=Information
    depends_on:
      sqlserver:
        condition: service_started # The app now waits only for the database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db-updater:
    profiles:
      - tools
    image: webapia/visa2026-importer:latest
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=Visa2026Db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - ApiOptions__BaseUrl=http://app:8080
    depends_on:
      - app

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Express
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sqlserver_data:
