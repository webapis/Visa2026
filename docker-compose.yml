services:
  app:
    image: webapia/visa2026:latest # <-- Pulls the image from Docker Hub instead of building
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=Visa2026Db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
    depends_on:
      sqlserver: { condition: service_healthy } # <-- It's also good practice to wait for the DB to be healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      retries: 10
      start_period: 10s
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
