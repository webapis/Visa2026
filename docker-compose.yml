services:
  app:
    image: webapia/visa2026:latest # <-- Pulls the image from Docker Hub instead of building
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=Visa2026Db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_started
      db-updater:
        condition: service_completed_successfully

  db-updater:
    image: webapia/visa2026:latest
    restart: on-failure
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=Visa2026Db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
    depends_on:
      - sqlserver
    command: ["dotnet", "Visa2026.Blazor.Server.dll", "--updateDatabase"]

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
