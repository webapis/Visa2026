# =============================================================================
# data.yaml — Scenario-based import data for Visa2026
# =============================================================================
#
# Structure:
#   scenarios:
#     - order: <int>            # execution sequence (lower runs first)
#       name: <string>          # unique scenario name
#       description: <string>   # human-readable description (optional)
#       dependsOn: <string>     # informational only — enforce via order
#       anchor:                 # idempotency check — skip scenario if record exists
#         entity: <ODataEntity>
#         key:    <OData property>
#         value:  <expected value>
#       data:
#         <SheetName>:          # must match ExcelMappings sheet names exactly
#           - <Column>: <value> # column headers must match ExcelMappings headers
#
# LOOKUP / REFERENCE DATA (not imported from this file):
#   Catalog rows must already exist in SQL (synced on app startup from Visa2026.Module).
#   When writing lookup column values (Country, Region, Gender, Application Type, …),
#   use the MAIN PROJECT as source of truth — do not duplicate catalog rows here.
#
#   Authoritative sources (repo paths):
#     Visa2026.Module/DatabaseUpdate/LookupCatalogs/*.json
#     Visa2026.Module/DatabaseUpdate/LookupCatalogs/tenant/*.json
#     Visa2026.Module/DatabaseUpdate/ApplicationTypeConfigurationSeed.Data.cs  (ApplicationType)
#     Visa2026.Module/DatabaseUpdate/LookupCatalogs/tenant/company-profile.json
#     Visa2026.Module/DatabaseUpdate/LookupCatalogs/tenant/authorized-signatory.json
#     LookupCatalogSyncUpdater → ApplicationNumberingProfile (tenant/application-numbering.json)
#     docs/LOOKUP_SEEDING.md
#   Human snapshot (optional): LOOKUPS.md at repo root (from lookup.xlsm via --dump-lookups)
#
# DEPENDENCY ORDER (must be respected within each scenario):
#   Shared (order 0):
#     Lodging (operational data; Company column references CompanyProfile Name from Module)
#     CompanyProfile, ProjectContract, signatories — tenant JSON in Visa2026.Module (not imported here)
#
#   Per-scenario (order >= 1), always in this sequence:
#     Persons
#     Passports                  ← required by ApplicationItem (CurrentPassport)
#     Education                  ← optional
#     MedicalRecords             ← optional
#     PositionHistory            ← for ApplicationItem.CurrentPositionHistory
#     EmployeeContracts          ← optional
#     (CompanyProfile / signatories — Module tenant JSON, not data.yaml)
#     Applications
#     ApplicationItems
#     Invitations                ← after Application
#     InvitationItems            ← after Invitation + Person + Passport
#
# IMPORTANT:
#   - Org singletons (CompanyProfile, signatories) must exist before Applications (Module seed).
#   - FullApplicationNumber cross-references use tenant format {MONTH}/-{NUMBER} (e.g. 4/-001 for
#     Application Number 001 with Date in April). See tenant/application-numbering.json.
#   - Lookup column values must match Name/Code in Module JSON catalogs (see paths above).
#   - Gender names are in Turkmen: Erkek (Male), Aýal (Female).
#   - Country names are in Turkmen: e.g. Birleşen Patyşalyk (United Kingdom).
#   - Application.CompanyHead and Application.Representative lookup by FullName
#     requires FullName to be a mapped OData property on those entities.
#     If lookup fails, set them manually in the Blazor UI after import.
# =============================================================================

scenarios:

