# =============================================================================
# data.yaml — Scenario-based import data for Visa2026
# =============================================================================
#
# Structure:
#   scenarios:
#     - order: <int>            # execution sequence (lower runs first)
#       name: <string>          # unique scenario name
#       description: <string>   # human-readable description (optional)
#       dependsOn: <string>     # informational only — enforce via order
#       anchor:                 # idempotency check — skip scenario if record exists
#         entity: <ODataEntity>
#         key:    <OData property>
#         value:  <expected value>
#       data:
#         <SheetName>:          # must match ExcelMappings sheet names exactly
#           - <Column>: <value> # column headers must match ExcelMappings headers
#
# DEPENDENCY ORDER (must be respected within each scenario):
#   Shared (order 0):
#     Company → ProjectContract
#
#   Per-scenario (order >= 1), always in this sequence:
#     Persons
#     Passports                  ← required by ApplicationItem (CurrentPassport)
#     Education                  ← optional
#     MedicalRecords             ← optional
#     PositionHistory            ← for ApplicationItem.CurrentPositionHistory
#     EmployeeContracts          ← optional
#     CompanyHead                ← REQUIRED by Application
#     Representative             ← REQUIRED by Application
#     Applications
#     ApplicationItems
#     Invitations                ← after Application
#     InvitationItems            ← after Invitation + Person + Passport
#
# IMPORTANT:
#   - CompanyHead and Representative must come before Applications.
#   - All lookup values must match names exactly as they appear in /LOOKUPS.md.
#   - Gender names are in Turkmen: Erkek (Male), Aýal (Female).
#   - Country names are in Turkmen: e.g. Birleşen Patyşalyk (United Kingdom).
#   - Application.CompanyHead and Application.Representative lookup by FullName
#     requires FullName to be a mapped OData property on those entities.
#     If lookup fails, set them manually in the Blazor UI after import.
# =============================================================================

scenarios:

  # ---------------------------------------------------------------------------
  # Shared — MUST always be order 0.
  # Seeds Company and ProjectContract which every other scenario depends on.
  # Anchor on Company.Name makes this idempotent.
  # All other scenarios must set dependsOn: Shared and order >= 1.
  # ---------------------------------------------------------------------------
  - order: 0
    name: Shared
    description: Company and project contract — foundation for all scenarios
    anchor:
      entity: Company
      key: Name
      value: Çalyk Enerji Sanaýi we Tijaret A.Ş. Türk kärhanasynyň Türkmenistandaky şahamçasy
    data:
      Company:
        - Name: Çalyk Enerji Sanaýi we Tijaret A.Ş. Türk kärhanasynyň Türkmenistandaky şahamçasy
          ShortName: Çalyk
          AppNumberPrefix: TRM-2026-
          ApplicationNumberPadding: 3
          IsDefault: true
      ProjectContract:
        - Name: ATP
          Company: Çalyk Enerji Sanaýi we Tijaret A.Ş. Türk kärhanasynyň Türkmenistandaky şahamçasy
          IsDefault: true

