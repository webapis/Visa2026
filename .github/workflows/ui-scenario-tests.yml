# Playwright UI scenarios from tools/UiScenarioRunner/scenarios/ against a running Blazor host.
# Requires GitHub secrets: DEVEXPRESS_LICENSE (same as publish-to-docker-hub workflow).

name: UI Scenario Tests

on:
  push:
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  UI_SCENARIO_CONNECTION: Server=(localdb)\mssqllocaldb;Database=Visa2026UiScenario;Trusted_Connection=True;MultipleActiveResultSets=true;TrustServerCertificate=True
  UI_SCENARIO_BASE_URL: http://localhost:5000

jobs:
  ui-scenarios:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Write DevExpress license
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path DevExpress.Key | Out-Null
          if ("${{ secrets.DEVEXPRESS_LICENSE }}" -ne "") {
            "${{ secrets.DEVEXPRESS_LICENSE }}" | Set-Content DevExpress.Key/DevExpress_License.txt -NoNewline
          } elseif ("${{ secrets.DEVEXPRESS_KEY }}" -ne "") {
            "${{ secrets.DEVEXPRESS_KEY }}" | Set-Content DevExpress.Key/DevExpress_License.txt -NoNewline
          } else {
            Write-Error "Set DEVEXPRESS_LICENSE or DEVEXPRESS_KEY repository secret for CI builds."
            exit 1
          }

      - name: Start LocalDB
        shell: pwsh
        run: |
          sqllocaldb create MSSQLLocalDB 2>$null
          sqllocaldb start MSSQLLocalDB
          $cn = New-Object System.Data.SqlClient.SqlConnection("Server=(localdb)\mssqllocaldb;Database=master;Integrated Security=True;TrustServerCertificate=True;")
          $cn.Open()
          try {
            $cmd = $cn.CreateCommand()
            $cmd.CommandText = "IF DB_ID(N'Visa2026UiScenario') IS NULL CREATE DATABASE [Visa2026UiScenario];"
            $null = $cmd.ExecuteNonQuery()
          } finally {
            $cn.Close()
          }

      - name: Restore and build
        run: |
          dotnet restore Visa2026.Blazor.Server/Visa2026.Blazor.Server.csproj
          dotnet restore tools/UiScenarioRunner/UiScenarioRunner.csproj
          dotnet build Visa2026.Blazor.Server/Visa2026.Blazor.Server.csproj -c Debug --no-restore
          dotnet build tools/UiScenarioRunner/UiScenarioRunner.csproj -c Debug --no-restore

      - name: Greenfield scenario database
        shell: pwsh
        run: |
          # Run XAF updaters before the web host — cold schema + LookupCatalogs sync can exceed LoginPage wait.
          $env:ConnectionStrings__DefaultConnection = $env:UI_SCENARIO_CONNECTION
          $hostExe = "Visa2026.Blazor.Server/bin/Debug/net8.0/Visa2026.Blazor.Server.exe"
          if (-not (Test-Path -LiteralPath $hostExe)) {
            throw "Host exe not found: $hostExe"
          }
          Write-Host "==> XAF --updateDatabase (Visa2026UiScenario)"
          & $hostExe --updateDatabase --silent --forceUpdate
          if ($LASTEXITCODE -eq 1) {
            throw "Database update failed (exit 1)."
          }
          Write-Host "Database update exit code: $LASTEXITCODE (0=updated, 2=already current)"

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          pwsh tools/UiScenarioRunner/bin/Debug/net8.0/playwright.ps1 install chromium

      - name: Start Blazor Server
        shell: pwsh
        run: |
          $env:ASPNETCORE_ENVIRONMENT = "Development"
          $env:VISA2026_UI_SCENARIOS = "true"
          $env:ASPNETCORE_URLS = $env:UI_SCENARIO_BASE_URL
          $env:ConnectionStrings__DefaultConnection = $env:UI_SCENARIO_CONNECTION
          Remove-Item Env:FORCE_XAF_DB_UPDATE -ErrorAction SilentlyContinue
          $proc = Start-Process -FilePath "dotnet" -ArgumentList @(
            "run",
            "--project", "Visa2026.Blazor.Server/Visa2026.Blazor.Server.csproj",
            "--no-build",
            "-c", "Debug",
            "--no-launch-profile"
          ) -PassThru -RedirectStandardOutput "blazor-out.log" -RedirectStandardError "blazor-err.log"
          "BLAZOR_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Blazor Server PID $($proc.Id)"

      - name: Wait for LoginPage
        shell: pwsh
        run: |
          $ready = $false
          $blazorPid = 0
          if ($env:BLAZOR_PID -match '^\d+$') {
            $blazorPid = [int]$env:BLAZOR_PID
          }

          for ($i = 0; $i -lt 120; $i++) {
            if ($blazorPid -gt 0) {
              $proc = Get-Process -Id $blazorPid -ErrorAction SilentlyContinue
              if (-not $proc) {
                Write-Host "Blazor process (PID $blazorPid) exited before LoginPage was ready."
                break
              }
            }

            try {
              $response = Invoke-WebRequest -Uri "$($env:UI_SCENARIO_BASE_URL)/LoginPage" -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 400) {
                $ready = $true
                Write-Host "LoginPage ready after $($i * 3)s"
                break
              }
            } catch {
              Write-Host "Waiting for app... ($($i * 3)s)"
            }
            Start-Sleep -Seconds 3
          }

          if (-not $ready) {
            Write-Host "--- blazor-out.log (tail) ---"
            Get-Content blazor-out.log -Tail 80 -ErrorAction SilentlyContinue
            Write-Host "--- blazor-err.log (tail) ---"
            Get-Content blazor-err.log -Tail 80 -ErrorAction SilentlyContinue
            throw "Blazor Server did not become ready on $($env:UI_SCENARIO_BASE_URL)/LoginPage"
          }

      - name: Run UI scenarios
        shell: pwsh
        run: |
          dotnet run --project tools/UiScenarioRunner/UiScenarioRunner.csproj --no-build -c Debug -- `
            --all --base-url $env:UI_SCENARIO_BASE_URL --timeout 120000
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Stop Blazor Server
        if: always()
        shell: pwsh
        run: |
          if ($env:BLAZOR_PID) {
            Stop-Process -Id $env:BLAZOR_PID -Force -ErrorAction SilentlyContinue
          }
          Get-Process -Name "Visa2026.Blazor.Server" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Upload Blazor logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-scenario-blazor-logs
          path: |
            blazor-out.log
            blazor-err.log
