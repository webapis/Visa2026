# This GitHub Actions workflow automates the process of building and deploying
# the Visa2026 application image to Docker Hub.
#
# It triggers automatically on every push to the 'main' branch.

name: Build and Publish to Docker Hub

on:
  push:
    branches:
      - droplet 

env:
  # Configuration: Set this to your Docker Hub repository
  DOCKER_IMAGE_NAME: webapia/visa2026 # <-- TODO: Replace with "your-username/your-repo-name"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub
      #    This action uses secrets to log in securely.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2.5 Write DevExpress license files for build-time and embedded licensing
      - name: Write DevExpress license key
        run: |
          mkdir -p DevExpress.Key
          echo "${{ secrets.DEVEXPRESS_KEY }}" > DevExpress.Key/DevExpress_License.txt
          
      - name: Write DevExpress license file
        run: echo "${{ secrets.DEVEXPRESS_LICENSE }}" > DevExpress.Key/DevExpress_License.txt

      - name: List files for verification
        run: ls -la

      # 2.6 Extract Version from .csproj
      - name: Get Version from Project
        id: get_version
        run: |
          echo "APP_VERSION=$(grep -oPm1 "(?<=<AssemblyVersion>)[^<]+" Visa2026.Module/Visa2026.Module.csproj)" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 3. Build and push the main app Docker image
      - name: Build and push app Docker image
        run: |
          docker build . --build-arg APP_VERSION=${{ env.APP_VERSION }} --build-arg GIT_SHA=${{ env.GIT_SHA_SHORT }} -t ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker build . --build-arg APP_VERSION=${{ env.APP_VERSION }} --build-arg GIT_SHA=${{ env.GIT_SHA_SHORT }} -t ${{ env.DOCKER_IMAGE_NAME }}:latest
          docker build . --build-arg APP_VERSION=${{ env.APP_VERSION }} --build-arg GIT_SHA=${{ env.GIT_SHA_SHORT }} -t ${{ env.DOCKER_IMAGE_NAME }}:${{ env.APP_VERSION }}
          docker push ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ env.DOCKER_IMAGE_NAME }}:${{ env.APP_VERSION }}
          docker build . --build-arg APP_VERSION=${{ env.APP_VERSION }} --build-arg GIT_SHA=${{ env.GIT_SHA_SHORT }} --tag ${{ env.DOCKER_IMAGE_NAME }}:latest --tag ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE_NAME }} --all-tags

      # 4. Build and push the importer Docker image
      - name: Build and push importer Docker image
        run: |
          docker build -f Visa2026.DataImporter/Dockerfile . -t webapia/visa2026-importer:latest
          docker push webapia/visa2026-importer:latest